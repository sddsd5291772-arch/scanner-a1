name: Run Forex Volatility Scanner

on:
  schedule:
    - cron: '0 0 * * *' # Fires once a day automatically as a backup safety kickstart
  workflow_dispatch:   # Allows manual trigger button capability

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests websocket-client numpy yfinance

      - name: Execute Scanner Logic
        env:
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PYTHONUNBUFFERED: '1'
        run: python scanner.py
        
