name: Run Forex Volatility Scanner

on:
  schedule:
    - cron: '*/15 * * * *' # Automatically restarts every 15 minutes to stay alive continuously
  workflow_dispatch: # Allows you to manually click a button to start it immediately

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Execute Scanner Logic
        env:
          FINNHUB_TOKEN: ${{ secrets.FINNHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PYTHONUNBUFFERED: '1' # 🔥 THIS FORCES PYTHON TO PRINT LIVE LOGS IMMEDIATELY
        run: python scanner.py
